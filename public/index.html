<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Metadata information about the webpage -->
    <meta charset="UTF-8">
    <title>Welcome to Mini Spotify</title>
</head>

<body>
    <!-- Main Heading: High importance header for the Welcome Page -->
    <header>
        <h1>Welcome to Mini Spotify</h1>
    </header>

    <main>
        <!-- Tagline/Description to orient the user to Scenario 7 -->
        <p>Your personal playlist manager. Create, share, and review your favourite tracks.</p>

        <hr> <!-- Visual separator -->

        <!-- Mandatory Linkages: Required for the first entry point -->
        <section>
            <h2>Get Started</h2>
            <ul>
                <!-- Link to Login Page: Points to the /auth/login route -->
                <li>Already have an account? <a href="/auth/login">Login here</a></li>

                <!-- Link to Registration Page: Points to the /auth/register route -->
                <li>New here? <a href="/auth/register">Create an account</a></li>
            </ul>
        </section>

        <br>
        <hr> <!-- Visual separator -->
    </main>
    <footer>
        <p>&copy; 2026 IS113 Team 6 - Mini Spotify Project</p>  
    </footer>
